<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <div class="form-section">
            <div id="auth-container">
                
                <div id="signup-form" class="auth-form active">
                    <h1>Get Started Now</h1>
                    
                    <form id="registerForm">
                        <div class="input-group">
                            <label for="reg-name">Name</label>
                            <input type="text" id="reg-name" placeholder="Enter your name" required>
                        </div>
                        <div class="input-group">
                            <label for="reg-email">Email address</label>
                            <input type="email" id="reg-email" placeholder="Enter your email" required>
                        </div>
                        <div class="input-group">
                            <label for="reg-password">Password</label>
                            <input type="password" id="reg-password" placeholder="Name" required>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="terms" required>
                            <label for="terms">I agree to the <a href="#">terms & policy</a></label>
                        </div>
                        <button type="submit" class="primary-btn">Signup</button>
                    </form>

                    <div class="divider">
                        <span>Or</span>
                    </div>

                    <div class="social-login">
                        <button class="social-btn">
                            <img src="https://img.icons8.com/color/24/000000/google-logo.png" alt="Google"> Sign in with Google
                        </button>
                        <button class="social-btn">
                            <img src="https://img.icons8.com/ios-filled/24/000000/mac-os.png" alt="Apple"> Sign in with Apple
                        </button>
                    </div>

                    <p class="switch-form">Have an account? <span onclick="toggleForm('login')">Sign In</span></p>
                </div>

                
                <div id="login-form" class="auth-form hidden">
                    <h1>Welcome back!</h1>
                    <p class="subtitle">Enter your Credentials to access your account</p>
                    
                    <form id="loginForm">
                        <div class="input-group">
                            <label for="log-email">Email address</label>
                            <input type="email" id="log-email" placeholder="Enter your email" required>
                        </div>
                        <div class="input-group">
                            <div class="label-row">
                                <label for="log-password">Password</label>
                                <a href="#" class="forgot-password">forgot password</a>
                            </div>
                            <input type="password" id="log-password" placeholder="Name" required>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember for 30 days</label>
                        </div>
                        <button type="submit" class="primary-btn">Login</button>
                    </form>

                    <div class="divider">
                        <span>Or</span>
                    </div>

                    <div class="social-login">
                        <button class="social-btn">
                            <img src="https://img.icons8.com/color/24/000000/google-logo.png" alt="Google"> Sign in with Google
                        </button>
                        <button class="social-btn">
                            <img src="https://img.icons8.com/ios-filled/24/000000/mac-os.png" alt="Apple"> Sign in with Apple
                        </button>
                    </div>

                    <p class="switch-form">Don't have an account? <span onclick="toggleForm('signup')">Sign Up</span></p>
                </div>
            </div>
        </div>

        
        <div class="image-section">
            <img src="image.png" alt="Monstera Plant Background" class="bg-image">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
